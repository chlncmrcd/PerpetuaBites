<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - PerpetuaBites</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header class="top-bar">
    PerpetuaBites
</header>

<button class="back-btn" onclick="goBack()">←</button>

<div class="container">
    <img src="images/logo.png" alt="Logo" class="logo">
    <h1>Your Cart</h1>

    <table class="order-table">
      <thead>
        <tr>
          <th>Item Name</th>
          <th>Price</th>
          <th>Quantity</th>
          <th>Subtotal</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="orderTableBody">
        <!-- Orders will be populated here -->
      </tbody>
    </table>


    <div class="summary-section">
      <div class="summary-row">
        <span class="summary-label">Subtotal:</span>
        <span class="price">₱<span id="subtotal">75</span></span>
      </div>

      <!-- Global Add-ons Section -->
      <div class="addons-section" id="addonsSection">
        <h3 style="color: #5670b0; margin-bottom: 15px;">Add-ons</h3>
        <div class="addons-grid">
          <label class="addon-item">
            <input type="checkbox" class="addon-checkbox" data-price="15" onchange="updateTotal()"> Egg (+₱15)
          </label>
          <label class="addon-item">
            <input type="checkbox" class="addon-checkbox" data-price="10" onchange="updateTotal()"> Sauce (+₱10)
          </label>
          <label class="addon-item">
            <input type="checkbox" class="addon-checkbox" data-price="20" onchange="updateTotal()"> Extra Rice (+₱20)
          </label>
        </div>
        <div class="addons-total" id="addonsTotal">Add-ons: ₱0</div>
      </div>

      <!-- Global Order Notes -->
      <div class="global-notes-section">
        <label for="globalNotes">Order Notes (for all items):</label>
        <textarea id="globalNotes" placeholder="e.g., Less spicy, no onions, delivery instructions..." rows="3" onchange="updateTotal()"></textarea>
      </div>
     
      <div class="total-price">
        <span class="total-label">TOTAL:</span>
        <span class="total-amount">₱<span id="totalAmount">225</span></span>
      </div>
    </div>

    <button class="confirm-btn" onclick="confirmOrder()">Confirm Order</button>
    <button class="back-to-menu-btn" onclick="goBackToMenu()">Back to Menu</button>
</div>

<footer>
    PerpetuaBites
</footer>

<script src="script.js"></script>
</body>
</html>
