<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canteen Menu - PerpetuaBites</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="top-bar">
    PerpetuaBites 
    <div class="header-buttons">
        <button class="cart-icon" onclick="goToCart()">🛒<span class="cart-badge" id="cartBadge">0</span></button>
    </div>
</header>

<button class="back-btn" onclick="goBack()">←</button>

<div class="container">

    <!-- CANTEEN IMAGE -->
    

    <!-- TITLE -->
    <h1 class="title">CANTEEN MENU</h1>

    <!-- CATEGORY TABS -->
    <div class="categories">
        <span class="active" onclick="filterCategory(event,'meals')">Meals</span>
        <span onclick="filterCategory(event,'snacks')">Snacks</span>
        <span onclick="filterCategory(event,'drinks')">Drinks</span>
        <span onclick="filterCategory(event,'desserts')">Desserts</span>
    </div>

    <!-- MENU GRID (populated dynamically by script.js) -->
    <div class="menu-grid"></div>
</div>

<!-- ORDER STATUS MODAL -->
<div id="orderStatusModal" class="modal hidden">
    <div class="modal-content">
        <button class="modal-close" onclick="closeOrderStatus()">✕</button>
        <h2>Your Order Status</h2>
        
        <div class="queue-container">
            <div class="queue-label">Queue Number</div>
            <div class="queue-number-modal" id="queueNumberModal">Loading...</div>
        </div>
        
        <div class="status-section">
            <div class="status-timeline-wrapper">
                <div class="status-step completed">
                    <div class="status-dot">✓</div>
                    <div class="status-label">Confirmed</div>
                </div>
                <div class="status-connector completed"></div>
                
                <div class="status-step active">
                    <div class="status-dot">⏳</div>
                    <div class="status-label">Preparing</div>
                </div>
                <div class="status-connector"></div>
                
                <div class="status-step">
                    <div class="status-dot">📦</div>
                    <div class="status-label">Ready</div>
                </div>
                <div class="status-connector"></div>
                
                <div class="status-step">
                    <div class="status-dot">✓</div>
                    <div class="status-label">Completed</div>
                </div>
            </div>
        </div>
        
        <div class="order-details order-details-modal">
            <div class="detail-title">Items:</div>
            <div class="order-items-list" id="orderItemsListModal">
                <div class="order-item">Loading...</div>
            </div>
            
            <div class="detail-title">Total:</div>
            <div class="detail-content detail-amount">₱<span id="totalAmountModal">0</span></div>
        </div>
        
        <button class="btn btn-primary" onclick="closeOrderStatus()">Close</button>
    </div>
</div>

<!-- TRACK ORDER BUTTON (bottom center) -->
<div class="track-bottom-wrapper">
    <button class="track-btn" id="trackStatusBtn" onclick="showOrderStatus()" style="display:none;">📋 Track Order</button>
</div>

<!-- FOOTER -->
<footer>
    PerpetuaBites
</footer>

<script src="script.js"></script>
</body>
</html>
