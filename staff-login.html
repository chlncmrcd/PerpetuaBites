<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Login - PerpetuaBites</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header class="top-bar">
    PerpetuaBites
</header>

<div class="login-box">
    <img src="images/logo.png" alt="Logo" class="logo">
    <h1>Staff Log In</h1>
    <input type="text" id="staffUsername" placeholder="Staff ID">
    <input type="password" id="staffPassword" placeholder="Password">
    <button class="submit-btn" onclick="loginStaff()">Submit</button>
</div>

<footer>
    PerpetuaBites
</footer>

<script src="script.js"></script>
