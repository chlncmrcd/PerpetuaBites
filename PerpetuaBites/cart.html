<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - PerpetuaBites</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header class="top-bar">
    PerpetuaBites
</header>

<div class="container">
    <img src="images/logo.png" alt="Logo" class="logo">
    <h1>Your Cart</h1>

    <table class="order-table">
      <thead>
        <tr>
          <th>Item Name</th>
          <th>Price</th>
          <th>Quantity</th>
          <th>Notes</th>
          <th>Subtotal</th>
        </tr>
      </thead>
      <tbody id="orderTableBody">
        <!-- Orders will be populated here -->
        <tr>
          <td class="item-name">Sample Item</td>
          <td class="price">₱75</td>
          <td><input type="number" value="1" min="1" class="quantity-input" onchange="updateTotal()"></td>
          <td><textarea placeholder="Add special notes..." class="note-input"></textarea></td>
          <td class="price">₱75</td>
        </tr>
      </tbody>
    </table>


    <div class="summary-section">
      <div class="summary-row">
        <span class="summary-label">Subtotal:</span>
        <span class="price">₱<span id="subtotal">75</span></span>
      </div>
      <div class="summary-row">
        <span class="summary-label">Delivery Fee:</span>
        <span class="price">₱<span id="delivery">0</span></span>
      </div>
      <div class="total-price">
        <span class="total-label">TOTAL:</span>
        <span class="total-amount">₱<span id="totalAmount">225</span></span>
      </div>
    </div>


    <button class="confirm-btn" onclick="confirmOrder()">Confirm Order</button>
    <button class="back-to-menu-btn" onclick="goBackToMenu()">Back to Menu</button>
</div>

<footer>
    PerpetuaBites
</footer>

<script src="script.js"></script>
</body>
</html>
